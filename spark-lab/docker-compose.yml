services:
  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    hostname: spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master", "--host", "spark-master", "--port", "7077", "--webui-port", "8080"]
    ports:
      - "18080:8080"
      - "7077:7077"
    volumes:
      - ./delta-data:/delta-data
    networks:
      - spark-net

  spark-worker-1:
    image: apache/spark:3.5.1
    container_name: spark-worker-1
    hostname: spark-worker-1
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "--cores", "2", "--memory", "1g", "--webui-port", "8081", "spark://spark-master:7077"]
    ports:
      - "8081:8081"
    volumes:
      - ./delta-data:/delta-data
    networks:
      - spark-net

  spark-worker-2:
    image: apache/spark:3.5.1
    container_name: spark-worker-2
    hostname: spark-worker-2
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "--cores", "2", "--memory", "1g", "--webui-port", "8081", "spark://spark-master:7077"]
    ports:
      - "8082:8081"
    volumes:
      - ./delta-data:/delta-data
    networks:
      - spark-net

  # --- Kafka (for Lab 5: streaming) ---

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: lab5-kafka-cluster-id-001
    networks:
      - spark-net

  # --- Jupyter Notebook (interactive playground with autocomplete) ---

  jupyter:
    image: apache/spark:3.5.1
    container_name: jupyter
    hostname: jupyter
    user: root
    depends_on:
      - spark-master
    command:
      - bash
      - -c
      - |
        pip install -q "notebook<7.3" delta-spark==3.1.0 && \
        PYSPARK_DRIVER_PYTHON=jupyter \
        PYSPARK_DRIVER_PYTHON_OPTS="notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token=spark" \
        /opt/spark/bin/pyspark \
          --master spark://spark-master:7077 \
          --packages io.delta:delta-spark_2.12:3.1.0,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.0 \
          --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension,org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions \
          --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog \
          --conf spark.sql.catalog.local=org.apache.iceberg.spark.SparkCatalog \
          --conf spark.sql.catalog.local.type=hadoop \
          --conf spark.sql.catalog.local.warehouse=/delta-data/iceberg-warehouse \
          --conf spark.jars.ivy=/tmp/.ivy2
    ports:
      - "8888:8888"
    volumes:
      - ./delta-data:/delta-data
      - ./notebooks:/notebooks
      - ./jobs:/jobs
    working_dir: /notebooks
    networks:
      - spark-net

  # --- Trino (for Lab 6: SQL query engine on the lakehouse) ---

  trino:
    image: trinodb/trino:439
    container_name: trino
    hostname: trino
    ports:
      - "18081:8080"    # Trino web UI + query endpoint
    volumes:
      - ./delta-data:/delta-data
      - ./trino-config/catalog:/etc/trino/catalog
    networks:
      - spark-net

networks:
  spark-net:
    driver: bridge
